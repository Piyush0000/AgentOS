# ========================================================
# 1. Registry Plane Service & Deployment
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-plane
  namespace: agentos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-plane
  template:
    metadata:
      labels:
        app: registry-plane
    spec:
      containers:
      - name: registry
        image: us-central1-docker.pkg.dev/agentos-502419/agentos/agentos-core:latest
        command: ["python", "-m", "core.registry.server"]
        ports:
        - containerPort: 50053
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: database-url
        - name: NATS_URL
          value: "nats://nats:4222"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "10m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: registry-plane
  namespace: agentos
spec:
  selector:
    app: registry-plane
  ports:
  - port: 50053
    targetPort: 50053
---

# ========================================================
# 2. Cognition Plane Service & Deployment
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognition-plane
  namespace: agentos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cognition-plane
  template:
    metadata:
      labels:
        app: cognition-plane
    spec:
      containers:
      - name: cognition
        image: us-central1-docker.pkg.dev/agentos-502419/agentos/agentos-core:latest
        command: ["python", "-m", "cognition.server"]
        ports:
        - containerPort: 50051
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: database-url
        - name: NATS_URL
          value: "nats://nats:4222"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: openai-api-key
              optional: true
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: gemini-api-key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: anthropic-api-key
              optional: true
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
          requests:
            cpu: "50m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cognition-plane
  namespace: agentos
spec:
  selector:
    app: cognition-plane
  ports:
  - port: 50051
    targetPort: 50051
---


# ========================================================
# 1. Express API Gateway Service & Deployment (Port 8000)
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: agentos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: us-central1-docker.pkg.dev/agentos-502419/agentos/agentos-express:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: RUNTIME_TARGET
          value: "runtime-plane:50054"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: jwt-secret
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "20m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: agentos
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
---

# ========================================================
# 2. Next.js Frontend Client Service & Deployment (Port 80)
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  namespace: agentos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
    spec:
      containers:
      - name: web
        image: us-central1-docker.pkg.dev/agentos-502419/agentos/agentos-web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://34.57.235.163:8000"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "20m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web-client
  namespace: agentos
spec:
  type: LoadBalancer
  selector:
    app: web-client
  ports:
  - name: http
    port: 80
    targetPort: 3000

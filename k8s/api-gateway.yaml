# ========================================================
# API Gateway & Dashboard Deployment
# ========================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: agentos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: us-central1-docker.pkg.dev/your-project-id/agentos/agentos-core:latest
        command: ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agentos-secrets
              key: database-url
        - name: NATS_URL
          value: "nats://nats:4222"
        - name: REGISTRY_TARGET
          value: "registry-plane:50053"
        - name: MEMORY_TARGET
          value: "memory-plane:50052"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
---
# ========================================================
# Public LoadBalancer Service for Web UI / Dashboard
# ========================================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: agentos
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: 8000
